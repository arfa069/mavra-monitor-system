name: mavra_api
version: 0.1.0
description: Generated Dart Dio client for the Mavra API.
homepage: homepage

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  dio: "^5.7.0"
  one_of: ">=1.5.0 <2.0.0"
  one_of_serializer: ">=1.5.0 <2.0.0"
  built_value: ">=8.4.0 <9.0.0"
  built_collection: ">=5.1.1 <6.0.0"

dev_dependencies:
  built_value_generator: 8.12.5
  build_runner: 2.15.0
  test: "^1.16.0"

dependency_overrides:
  dart_style: 3.1.8
