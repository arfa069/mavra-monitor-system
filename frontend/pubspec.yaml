name: mavra_frontend
description: Flutter frontend for the Mavra monitor system.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  built_collection: ^5.1.1
  built_value: ^8.12.6
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  file_selector: 1.0.0
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  go_router: ^17.3.0
  json_annotation: ^4.12.0
  mavra_api:
    path: lib/core/api/generated
  path_provider: ^2.1.6
  fl_chart: ^1.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  build_runner: ^2.15.0
  built_value_generator: ^8.12.5
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

dependency_overrides:
  # Keep Android builds on the Groovy/AGP 8.5.x plugin line while the latest
  # file_selector_android requires newer Kotlin/Gradle artifacts.
  file_selector_android: 0.5.1+12
  flutter_secure_storage_windows:
    path: third_party/flutter_secure_storage_windows

flutter:
  uses-material-design: true
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-VF.ttf
