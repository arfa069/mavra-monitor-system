name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  FLUTTER_VERSION: "3.44.2"
  JAVA_VERSION: "17"
  NODE_VERSION: "20"
  OPENAPI_GENERATOR_WRAPPER_VERSION: "2.38.0"
  OPENAPI_GENERATOR_VERSION: "7.23.0"
  JWT_SECRET_KEY: "ci-only-jwt-secret-key-for-contract-and-tests-2026"
  APP_NAME: "Mavra"

jobs:
  lint:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --extra dev
        working-directory: backend

      - name: Run ruff
        run: uv run --extra dev python -m ruff check .
        working-directory: backend

  test:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pricemonitor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pricemonitor_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --extra dev
        working-directory: backend

      - name: Run database migrations
        run: uv run --extra dev alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pricemonitor_test

      - name: Seed default test user
        run: |
          uv run --extra dev python - <<'PY'
          import asyncio

          from sqlalchemy import text

          from app.database import engine


          async def main() -> None:
              async with engine.begin() as conn:
                  await conn.execute(text("""
                      INSERT INTO users (
                          id, username, email, hashed_password, is_active, role,
                          data_retention_days, created_at, updated_at
                      )
                      VALUES (
                          1, 'ci-default-user', 'ci-default@example.test',
                          'ci-placeholder-hash', true, 'user',
                          365, NOW(), NOW()
                      )
                      ON CONFLICT (id) DO NOTHING
                  """))
                  await conn.execute(text("""
                      SELECT setval(
                          pg_get_serial_sequence('users', 'id'),
                          GREATEST((SELECT COALESCE(MAX(id), 1) FROM users), 1),
                          true
                      )
                  """))
              await engine.dispose()


          asyncio.run(main())
          PY
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pricemonitor_test

      - name: Run pytest
        run: uv run --extra dev python -m pytest -v --tb=short
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/pricemonitor_test

  compile:
    name: Backend compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --extra dev
        working-directory: backend

      - name: Compile Python files
        run: uv run --extra dev python -m compileall app alembic
        working-directory: backend

  api-contract:
    name: API contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Node.js for OpenAPI generator wrapper
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-${{ hashFiles('frontend/pubspec.lock', 'frontend/openapitools.json', 'frontend/openapi-generator-config.yaml', 'frontend/openapi.json') }}
          pub-cache-key: pub-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-${{ hashFiles('frontend/pubspec.lock', 'frontend/openapitools.json', 'frontend/openapi-generator-config.yaml', 'frontend/openapi.json') }}

      - name: Install backend dependencies
        run: uv sync --extra dev
        working-directory: backend

      - name: Resolve Flutter dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Verify generator pins
        shell: pwsh
        run: |
          $wrapperPinned = Select-String -Path scripts/generate_dart_client.ps1 -Pattern "@openapitools/openapi-generator-cli@$env:OPENAPI_GENERATOR_WRAPPER_VERSION" -Quiet
          if (-not $wrapperPinned) {
            throw "Expected OpenAPI generator wrapper $env:OPENAPI_GENERATOR_WRAPPER_VERSION in scripts/generate_dart_client.ps1"
          }
          $tools = Get-Content frontend/openapitools.json -Raw | ConvertFrom-Json
          if ($tools.'generator-cli'.version -ne $env:OPENAPI_GENERATOR_VERSION) {
            throw "Expected OpenAPI generator $env:OPENAPI_GENERATOR_VERSION, found $($tools.'generator-cli'.version)"
          }

      - name: Verify Dart API generator output
        shell: pwsh
        run: ./scripts/generate_dart_client.ps1 -Check

      - name: Test Dart API usage checker
        run: uv run --extra dev python -m pytest ../scripts/tests/test_check_dart_api_usage.py -q
        working-directory: backend

      - name: Verify generated API artifacts
        run: uv run --extra dev python ../scripts/check_api_contract.py
        working-directory: backend

      - name: Verify Dart API usage
        run: uv run --extra dev python ../scripts/check_dart_api_usage.py
        working-directory: backend

  flutter-web-fast:
    name: Flutter Web fast PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Node.js for OpenAPI generator wrapper
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-${{ hashFiles('frontend/pubspec.lock', 'frontend/openapitools.json', 'frontend/openapi-generator-config.yaml', 'frontend/openapi.json') }}
          pub-cache-key: pub-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-${{ hashFiles('frontend/pubspec.lock', 'frontend/openapitools.json', 'frontend/openapi-generator-config.yaml', 'frontend/openapi.json') }}

      - name: Install backend dependencies
        run: uv sync --extra dev
        working-directory: backend

      - name: Resolve Flutter dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Verify Dart API generator output
        shell: pwsh
        run: ./scripts/generate_dart_client.ps1 -Check

      - name: Run Flutter analyzer
        shell: bash
        run: |
          mkdir -p build/ci
          set -o pipefail
          flutter analyze 2>&1 | tee build/ci/flutter-analyze.txt
        working-directory: frontend

      - name: Run Flutter tests
        run: flutter test --machine > build/ci/flutter-test-results.json
        working-directory: frontend

      - name: Build Flutter Web
        run: flutter build web --dart-define=API_BASE_URL=/api/v1
        working-directory: frontend

      - name: Package Flutter Web artifact
        run: tar -C frontend/build/web -czf frontend-web.tar.gz .

      - name: Upload Flutter Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: termux-frontend-web
          path: frontend-web.tar.gz
          if-no-files-found: error

      - name: Upload Flutter failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-fast-failure
          path: frontend/build/ci/**
          if-no-files-found: ignore

  blog:
    name: Blog tests and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: blog-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: blog-frontend

      - name: Run blog tests
        run: npm test
        working-directory: blog-frontend

      - name: Build blog
        run: npm run build
        working-directory: blog-frontend

      - name: Package blog artifacts
        shell: bash
        run: |
          tar -C blog-frontend/.next/standalone -czf blog-standalone.tar.gz .
          tar -C blog-frontend/.next -czf blog-static.tar.gz static
          if [ -d blog-frontend/public ]; then
            tar -C blog-frontend/public -czf blog-public.tar.gz .
          fi

      - name: Upload blog artifacts
        uses: actions/upload-artifact@v4
        with:
          name: termux-blog-build
          path: |
            blog-standalone.tar.gz
            blog-static.tar.gz
            blog-public.tar.gz
          if-no-files-found: ignore

  deploy-termux:
    name: Deploy Termux
    runs-on: [self-hosted, Windows, mavra-deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      actions: read
      contents: read
    needs:
      - lint
      - test
      - compile
      - api-contract
      - flutter-web-fast
      - blog
    environment: production-termux
    concurrency:
      group: production-termux
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Download Flutter Web artifact
        uses: actions/download-artifact@v4
        with:
          name: termux-frontend-web
          path: ${{ runner.temp }}/mavra-termux-artifacts/frontend

      - name: Download blog artifacts
        uses: actions/download-artifact@v4
        with:
          name: termux-blog-build
          path: ${{ runner.temp }}/mavra-termux-artifacts/blog

      - name: Deploy to Termux
        shell: powershell
        env:
          TERMUX_HOST: ${{ vars.TERMUX_HOST }}
          TERMUX_PORT: ${{ vars.TERMUX_PORT }}
          TERMUX_USER: ${{ vars.TERMUX_USER }}
          TERMUX_APP_DIR: ${{ vars.TERMUX_APP_DIR }}
          TERMUX_KNOWN_HOSTS: ${{ vars.TERMUX_KNOWN_HOSTS }}
          TERMUX_TRANSFER_MODE: ${{ vars.TERMUX_TRANSFER_MODE }}
          TERMUX_SSH_KEY: ${{ secrets.TERMUX_SSH_KEY }}
          DEPLOY_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          TERMUX_ARTIFACT_DIR: ${{ runner.temp }}/mavra-termux-artifacts
        run: ./scripts/deploy_termux_from_runner.ps1

  android-smoke:
    name: Android build and smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-${{ hashFiles('frontend/pubspec.lock', 'frontend/openapitools.json', 'frontend/openapi-generator-config.yaml', 'frontend/openapi.json') }}
          pub-cache-key: pub-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-${{ hashFiles('frontend/pubspec.lock', 'frontend/openapitools.json', 'frontend/openapi-generator-config.yaml', 'frontend/openapi.json') }}

      - name: Cache Android and Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/cache
            ~/.gradle/caches
            ~/.gradle/wrapper
            frontend/android/.gradle
          key: android-gradle-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-${{ hashFiles('frontend/pubspec.lock', 'frontend/openapitools.json', 'frontend/openapi-generator-config.yaml', 'frontend/openapi.json') }}

      - name: Resolve Flutter dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Build Android APK
        run: flutter build apk --dart-define=API_BASE_URL=http://10.0.2.2:8000/api/v1
        working-directory: frontend

      - name: Run Android auth smoke
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          script: cd frontend && flutter test integration_test/auth_smoke_test.dart -d emulator-5554 --dart-define=API_BASE_URL=http://10.0.2.2:8000/api/v1

  windows-smoke:
    name: Windows build and smoke
    runs-on: windows-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Node.js for OpenAPI generator wrapper
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-${{ hashFiles('frontend/pubspec.lock', 'frontend/openapitools.json', 'frontend/openapi-generator-config.yaml', 'frontend/openapi.json') }}
          pub-cache-key: pub-${{ runner.os }}-${{ env.FLUTTER_VERSION }}-${{ hashFiles('frontend/pubspec.lock', 'frontend/openapitools.json', 'frontend/openapi-generator-config.yaml', 'frontend/openapi.json') }}

      - name: Install backend dependencies
        run: uv sync --extra dev
        working-directory: backend

      - name: Resolve Flutter dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Verify Dart API generator output
        shell: pwsh
        run: ./scripts/generate_dart_client.ps1 -Check

      - name: Run Flutter analyzer
        run: flutter analyze
        working-directory: frontend

      - name: Run Flutter tests
        run: flutter test
        working-directory: frontend

      - name: Build Flutter Windows
        run: flutter build windows --dart-define=API_BASE_URL=http://127.0.0.1:8000/api/v1
        working-directory: frontend

      - name: Run Windows auth smoke
        run: flutter test integration_test\auth_smoke_test.dart -d windows --dart-define=API_BASE_URL=http://127.0.0.1:8000/api/v1
        working-directory: frontend

  full-platform-summary:
    name: Scheduled full-platform summary
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs:
      - flutter-web-fast
      - android-smoke
      - windows-smoke
    steps:
      - name: Summarize platform evidence
        run: |
          echo "Flutter Web, Android, and Windows smoke jobs completed."
          echo "Use this scheduled run as full-platform release evidence."
